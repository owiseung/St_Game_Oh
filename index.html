<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEON BREAKER · 벽돌깨기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0e1f;
    --bg-panel:#121a33;
    --bg-cabinet:#0d1225;
    --neon-cyan:#4be3d6;
    --neon-pink:#ff4fa8;
    --neon-amber:#ffd166;
    --neon-violet:#9b7bff;
    --neon-lime:#8bff6b;
    --text-main:#eaf2ff;
    --text-muted:#7c88b8;
    --font-display:'Press Start 2P', monospace;
    --font-body:'Space Grotesk', -apple-system, sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:
      radial-gradient(circle at 50% 0%, #1a2450 0%, var(--bg-deep) 55%, #05070f 100%);
    color:var(--text-main);
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 12px 28px;
  }

  .cabinet{
    width:100%;
    max-width:460px;
    background:linear-gradient(180deg, #171f42 0%, var(--bg-cabinet) 100%);
    border-radius:22px;
    padding:16px 16px 20px;
    box-shadow:
      0 0 0 1px rgba(155,123,255,0.15),
      0 0 40px rgba(75,227,214,0.10),
      0 30px 60px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .marquee{
    text-align:center;
    padding:10px 6px 16px;
    letter-spacing:1px;
  }
  .marquee h1{
    font-family:var(--font-display);
    font-size:15px;
    margin:0 0 8px;
    color:var(--neon-cyan);
    text-shadow:
      0 0 6px rgba(75,227,214,0.9),
      0 0 22px rgba(75,227,214,0.5);
  }
  .marquee p{
    margin:0;
    font-size:11px;
    color:var(--text-muted);
    letter-spacing:0.5px;
  }

  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 4px 10px;
    font-family:var(--font-display);
    font-size:10px;
  }
  .hud .stat{ display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
  .hud .stat.center{ align-items:center; }
  .hud .stat.right{ align-items:flex-end; }
  .hud .label{ color:var(--text-muted); font-size:8px; }
  .hud .value{ color:var(--neon-amber); text-shadow:0 0 8px rgba(255,209,102,0.6); }
  .hud .value.score{ color:var(--neon-pink); text-shadow:0 0 8px rgba(255,79,168,0.6); }
  .hud .lives{ display:flex; gap:5px; margin-top:2px; }
  .hud .life-dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--neon-lime);
    box-shadow:0 0 6px rgba(139,255,107,0.9);
  }
  .hud .life-dot.lost{ background:#2a3355; box-shadow:none; }

  #sound-toggle{
    background:none;
    border:1px solid rgba(255,255,255,0.15);
    color:var(--text-muted);
    border-radius:8px;
    font-family:var(--font-display);
    font-size:9px;
    padding:5px 7px;
    cursor:pointer;
  }
  #sound-toggle:active{ transform:scale(0.94); }

  .screen-wrap{
    position:relative;
    width:100%;
    aspect-ratio: 480 / 760;
    border-radius:14px;
    overflow:hidden;
    background:#060a17;
    box-shadow:
      0 0 0 2px rgba(75,227,214,0.18),
      inset 0 0 40px rgba(0,0,0,0.75),
      inset 0 0 2px rgba(255,255,255,0.08);
    touch-action:none;
    cursor:pointer;
  }

  #game{
    display:block;
    width:100%;
    height:100%;
  }

  .scanlines{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.035) 0px,
      rgba(255,255,255,0.035) 1px,
      transparent 2px,
      transparent 3px
    );
    mix-blend-mode:overlay;
  }
  .vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
    box-shadow: inset 0 0 90px 20px rgba(0,0,0,0.65);
  }

  .overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    background:rgba(6,9,20,0.86);
    backdrop-filter:blur(2px);
    text-align:center;
    padding:24px;
  }
  .overlay.hidden{ display:none; }
  .overlay h2{
    font-family:var(--font-display);
    font-size:16px;
    margin:0;
    color:var(--neon-pink);
    text-shadow:0 0 10px rgba(255,79,168,0.7);
  }
  .overlay .sub{
    font-size:12px;
    line-height:1.8;
    color:var(--text-muted);
    max-width:280px;
  }
  .overlay .sub b{ color:var(--neon-amber); font-weight:600; }
  .overlay .score-line{
    font-family:var(--font-display);
    font-size:11px;
    color:var(--neon-cyan);
    text-shadow:0 0 8px rgba(75,227,214,0.6);
  }
  .overlay .score-line small{
    display:block;
    margin-top:8px;
    font-size:9px;
    color:var(--neon-amber);
  }

  .btn{
    font-family:var(--font-display);
    font-size:11px;
    color:#08101f;
    background:linear-gradient(180deg, var(--neon-cyan), #2bb8ab);
    border:none;
    padding:14px 22px;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 18px rgba(75,227,214,0.55), 0 6px 0 #1c8a80;
    letter-spacing:0.5px;
  }
  .btn:active{
    transform:translateY(3px);
    box-shadow:0 0 12px rgba(75,227,214,0.5), 0 3px 0 #1c8a80;
  }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--text-muted);
    padding-top:14px;
    letter-spacing:0.3px;
  }
  .footer-note b{ color:var(--neon-violet); }

  @media (max-width:360px){
    .marquee h1{ font-size:13px; }
    .hud{ font-size:9px; }
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="marquee">
    <h1>NEON BREAKER</h1>
    <p>클릭 · 탭 한 번으로 즐기는 벽돌깨기</p>
  </div>

  <div class="hud">
    <div class="stat">
      <span class="label">SCORE</span>
      <span class="value score" id="hud-score">0</span>
    </div>
    <div class="stat center">
      <span class="label">STAGE</span>
      <span class="value" id="hud-level">1</span>
    </div>
    <div class="stat right">
      <span class="label">LIVES</span>
      <div class="lives" id="hud-lives"></div>
    </div>
  </div>

  <div class="screen-wrap" id="screen-wrap">
    <canvas id="game"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="overlay" id="overlay-start">
      <h2>NEON BREAKER</h2>
      <p class="sub">화면을 <b>클릭(모바일은 탭)</b>하면 시작합니다.<br>공을 놓치지 않도록 클릭한 위치로 패들이 이동해요.</p>
      <button class="btn" id="btn-start">시작하기</button>
    </div>

    <div class="overlay hidden" id="overlay-gameover">
      <h2 id="gameover-title">GAME OVER</h2>
      <p class="score-line" id="final-score">SCORE 0
        <small id="high-score-line">HIGH SCORE 0</small>
      </p>
      <button class="btn" id="btn-restart">다시 시작</button>
    </div>
  </div>

  <div class="footer-note">
    <button id="sound-toggle" aria-label="사운드 켜기/끄기">🔊 ON</button>
    &nbsp; PC: <b>마우스 클릭</b> &nbsp;·&nbsp; 모바일: <b>화면 탭</b>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- 기본 설정 (논리 좌표계, 실제 화면 크기와 무관) ----------
  const LW = 480, LH = 760;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('screen-wrap');

  const overlayStart = document.getElementById('overlay-start');
  const overlayGameover = document.getElementById('overlay-gameover');
  const btnStart = document.getElementById('btn-start');
  const btnRestart = document.getElementById('btn-restart');
  const soundBtn = document.getElementById('sound-toggle');

  const hudScore = document.getElementById('hud-score');
  const hudLevel = document.getElementById('hud-level');
  const hudLives = document.getElementById('hud-lives');
  const finalScoreEl = document.getElementById('final-score');
  const highScoreLine = document.getElementById('high-score-line');
  const gameoverTitle = document.getElementById('gameover-title');

  function setupCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = LW * dpr;
    canvas.height = LH * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  setupCanvas();
  window.addEventListener('resize', setupCanvas);
  window.addEventListener('orientationchange', setupCanvas);

  // ---------- 사운드 (외부 파일 없이 WebAudio로 간단 합성) ----------
  let audioCtx = null;
  let soundOn = true;
  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; }
    }
  }
  function beep(freq, duration, type, gainVal){
    if(!soundOn || !audioCtx) return;
    try{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || 'square';
      osc.frequency.value = freq;
      gain.gain.value = gainVal || 0.05;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(gain.gain.value, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.start(now);
      osc.stop(now + duration);
    }catch(e){}
  }
  const sfx = {
    brick: ()=>beep(520 + Math.random()*160, 0.09, 'square', 0.05),
    paddle: ()=>beep(220, 0.08, 'triangle', 0.06),
    wall: ()=>beep(160, 0.06, 'sine', 0.04),
    life: ()=>beep(110, 0.35, 'sawtooth', 0.05),
    stage: ()=>{ beep(660,0.1,'square',0.05); setTimeout(()=>beep(880,0.14,'square',0.05),100); },
    over: ()=>{ beep(300,0.18,'sawtooth',0.05); setTimeout(()=>beep(180,0.3,'sawtooth',0.05),160); }
  };
  soundBtn.addEventListener('click', ()=>{
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊 ON' : '🔇 OFF';
  });

  // ---------- 게임 상태 ----------
  const ROW_COLORS = ['#ff4fa8', '#ff7a59', '#ffd166', '#8bff6b', '#4be3d6', '#9b7bff'];
  const HIGH_SCORE_KEY = 'neonBreakerHighScore';

  let gameState = 'start'; // 'start' | 'playing' | 'gameover'
  let score = 0;
  let level = 1;
  let lives = 3;
  let highScore = 0;
  try{ highScore = parseInt(localStorage.getItem(HIGH_SCORE_KEY) || '0', 10) || 0; }catch(e){}

  const paddle = { w:86, h:14, x:(LW-86)/2, y:LH-60, targetX:(LW-86)/2, speedFactor:0.28 };
  const ball = { x:0, y:0, r:7, vx:0, vy:0, attached:true, baseSpeed:4.6, speed:4.6 };
  let bricks = [];
  let particles = [];
  let banner = null; // { text, until }

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  function resetBallOnPaddle(){
    ball.attached = true;
    ball.x = paddle.x + paddle.w/2;
    ball.y = paddle.y - ball.r - 1;
    ball.vx = 0;
    ball.vy = 0;
  }

  function buildLevel(){
    bricks = [];
    const rows = Math.min(5 + Math.floor((level-1)/2), 8);
    const cols = 8;
    const paddingX = 20;
    const gap = 6;
    const brickW = (LW - paddingX*2 - gap*(cols-1)) / cols;
    const brickH = 22;
    const topY = 58;

    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        bricks.push({
          x: paddingX + c*(brickW+gap),
          y: topY + r*(brickH+gap),
          w: brickW,
          h: brickH,
          color: ROW_COLORS[r % ROW_COLORS.length],
          score: (rows-r) * 10,
          alive: true
        });
      }
    }

    ball.speed = Math.min(ball.baseSpeed + (level-1)*0.35, 9.5);
    paddle.x = (LW-paddle.w)/2;
    paddle.targetX = paddle.x;
    resetBallOnPaddle();
  }

  function updateHud(){
    hudScore.textContent = score;
    hudLevel.textContent = level;
    hudLives.innerHTML = '';
    for(let i=0;i<3;i++){
      const dot = document.createElement('div');
      dot.className = 'life-dot' + (i < lives ? '' : ' lost');
      hudLives.appendChild(dot);
    }
  }

  function startGame(){
    ensureAudio();
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    score = 0; level = 1; lives = 3;
    buildLevel();
    particles = [];
    banner = null;
    gameState = 'playing';
    overlayStart.classList.add('hidden');
    overlayGameover.classList.add('hidden');
    updateHud();
  }

  function loseLife(){
    lives -= 1;
    sfx.life();
    updateHud();
    if(lives <= 0){
      gameOver();
    }else{
      resetBallOnPaddle();
    }
  }

  function gameOver(){
    gameState = 'gameover';
    sfx.over();
    if(score > highScore){
      highScore = score;
      try{ localStorage.setItem(HIGH_SCORE_KEY, String(highScore)); }catch(e){}
      gameoverTitle.textContent = 'NEW RECORD!';
    }else{
      gameoverTitle.textContent = 'GAME OVER';
    }
    finalScoreEl.innerHTML = 'SCORE ' + score + '<small id="hs2">HIGH SCORE ' + highScore + '</small>';
    overlayGameover.classList.remove('hidden');
  }

  function stageClear(){
    level += 1;
    sfx.stage();
    banner = { text: 'STAGE ' + level + ' READY', until: performance.now() + 1200 };
    buildLevel();
    updateHud();
  }

  function launchBall(){
    ball.attached = false;
    const angle = (Math.random()*0.6 - 0.3); // -0.3 ~ 0.3 라디안
    ball.vx = ball.speed * Math.sin(angle);
    ball.vy = -ball.speed * Math.cos(angle);
  }

  function spawnParticles(x, y, color){
    for(let i=0;i<7;i++){
      particles.push({
        x, y,
        vx:(Math.random()-0.5)*5,
        vy:(Math.random()-0.5)*5 - 1,
        life:1,
        color
      });
    }
  }

  // ---------- 입력 : 클릭 / 탭 한 번으로만 조작 ----------
  function pointerXToLogical(clientX){
    const rect = wrap.getBoundingClientRect();
    const ratio = clamp((clientX - rect.left) / rect.width, 0, 1);
    return ratio * LW;
  }

  wrap.addEventListener('pointerdown', function(e){
    if(gameState !== 'playing') return;
    const lx = pointerXToLogical(e.clientX);
    paddle.targetX = clamp(lx - paddle.w/2, 0, LW - paddle.w);
    if(ball.attached){
      launchBall();
    }
  });

  btnStart.addEventListener('click', function(e){
    e.stopPropagation();
    startGame();
  });
  btnRestart.addEventListener('click', function(e){
    e.stopPropagation();
    startGame();
  });

  // ---------- 충돌 처리 ----------
  function updatePaddle(dt){
    paddle.x += (paddle.targetX - paddle.x) * Math.min(1, paddle.speedFactor * dt);
    paddle.x = clamp(paddle.x, 0, LW - paddle.w);
  }

  function updateBall(dt){
    if(ball.attached){
      ball.x = paddle.x + paddle.w/2;
      ball.y = paddle.y - ball.r - 1;
      return;
    }

    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // 좌우 벽
    if(ball.x - ball.r <= 0){
      ball.x = ball.r;
      ball.vx = Math.abs(ball.vx);
      sfx.wall();
    }else if(ball.x + ball.r >= LW){
      ball.x = LW - ball.r;
      ball.vx = -Math.abs(ball.vx);
      sfx.wall();
    }
    // 위쪽 벽
    if(ball.y - ball.r <= 0){
      ball.y = ball.r;
      ball.vy = Math.abs(ball.vy);
      sfx.wall();
    }

    // 패들
    if(ball.vy > 0 &&
       ball.y + ball.r >= paddle.y &&
       ball.y - ball.r <= paddle.y + paddle.h &&
       ball.x >= paddle.x - ball.r &&
       ball.x <= paddle.x + paddle.w + ball.r){
      const rel = clamp((ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2), -1, 1);
      const maxAngle = 1.15; // 라디안, 약 66도
      const angle = rel * maxAngle;
      ball.vx = ball.speed * Math.sin(angle);
      ball.vy = -ball.speed * Math.cos(angle);
      ball.y = paddle.y - ball.r - 0.5;
      sfx.paddle();
    }

    // 바닥으로 떨어짐
    if(ball.y - ball.r > LH){
      loseLife();
      return;
    }

    // 벽돌
    for(let i=0;i<bricks.length;i++){
      const b = bricks[i];
      if(!b.alive) continue;
      if(ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
         ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h){

        const overlapX = Math.min(ball.x + ball.r - b.x, b.x + b.w - (ball.x - ball.r));
        const overlapY = Math.min(ball.y + ball.r - b.y, b.y + b.h - (ball.y - ball.r));
        if(overlapX < overlapY){
          ball.vx = -ball.vx;
        }else{
          ball.vy = -ball.vy;
        }

        b.alive = false;
        score += b.score;
        ball.speed = Math.min(ball.speed + 0.01, 11);
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
        sfx.brick();
        updateHud();
        break;
      }
    }

    // 스테이지 클리어 확인
    if(bricks.every(b => !b.alive)){
      stageClear();
    }
  }

  function updateParticles(dt){
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.18 * dt;
      p.life -= 0.045 * dt;
      if(p.life <= 0) particles.splice(i,1);
    }
  }

  // ---------- 렌더링 ----------
  function drawRoundedRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function render(){
    // 트레일 효과를 위해 완전히 지우지 않고 반투명하게 덮기
    ctx.fillStyle = 'rgba(6,10,23,0.35)';
    ctx.fillRect(0,0,LW,LH);

    // 벽돌
    for(const b of bricks){
      if(!b.alive) continue;
      ctx.save();
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = b.color;
      drawRoundedRect(b.x, b.y, b.w, b.h, 5);
      ctx.fill();
      ctx.restore();
    }

    // 파티클
    for(const p of particles){
      ctx.save();
      ctx.globalAlpha = clamp(p.life, 0, 1);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fillRect(p.x-2, p.y-2, 4, 4);
      ctx.restore();
    }

    // 패들
    ctx.save();
    ctx.shadowColor = '#4be3d6';
    ctx.shadowBlur = 14;
    const grad = ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);
    grad.addColorStop(0, '#4be3d6');
    grad.addColorStop(1, '#9b7bff');
    ctx.fillStyle = grad;
    drawRoundedRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
    ctx.fill();
    ctx.restore();

    // 공
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#eaf2ff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 배너 (스테이지 클리어 등)
    if(banner){
      if(performance.now() < banner.until){
        ctx.save();
        ctx.textAlign = 'center';
        ctx.font = '16px "Press Start 2P", monospace';
        ctx.fillStyle = 'rgba(6,10,23,0.7)';
        ctx.fillRect(LW/2-150, LH/2-24, 300, 48);
        ctx.shadowColor = '#ffd166';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ffd166';
        ctx.fillText(banner.text, LW/2, LH/2+6);
        ctx.restore();
      }else{
        banner = null;
      }
    }

    // 시작 대기 안내 (플레이 중 & 공이 패들에 붙어있을 때)
    if(gameState === 'playing' && ball.attached && !banner){
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillStyle = 'rgba(234,242,255,0.75)';
      ctx.fillText('탭해서 발사', LW/2, paddle.y - 26);
      ctx.restore();
    }
  }

  // ---------- 메인 루프 ----------
  let lastTime = performance.now();
  function loop(now){
    let dt = (now - lastTime) / 16.6667;
    dt = clamp(dt, 0, 3);
    lastTime = now;

    if(gameState === 'playing'){
      updatePaddle(dt);
      updateBall(dt);
    }
    updateParticles(dt);
    render();

    requestAnimationFrame(loop);
  }

  document.addEventListener('visibilitychange', function(){
    if(!document.hidden){ lastTime = performance.now(); }
  });

  // 초기 화면
  buildLevel();
  updateHud();
  highScoreLine.textContent = 'HIGH SCORE ' + highScore;
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
